<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Listing Website</title>
    <link rel="stylesheet" href="styles.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header"></header>
    <div id="searchBar"></div>
    <section>
        <div class="container">
            <div class="profile" id="tags">
                <img src="https://d3dyfaf3iutrxo.cloudfront.net/general/upload/d1b1de43ca6a441e99543d80eb517d34.svg" alt="logo">
                <div class="post">
                    <div class="company">
                        <p id="company-name">Photosnap</p>
                        <button id="new">New!</button>
                        <button id="featured">FEATURED</button>
                    </div>
                    <h1>Senior Frontend Developer</h1>
                    <div class="post-time">
                        <ul class="post-timeUL">
                            <li>1d ago</li>
                            <span></span>
                            <li>Full Time</li>
                            <span></span>
                            <li>USA Only</li>
                        </ul>
                    </div>
                </div>
                <div class="post-tags">
                    <button class="tag">Frontend</button>
                    <button class="tag">Senior</button>
                    <button class="tag">HTML</button>
                    <button class="tag">CSS</button>
                    <button class="tag">JavaScript</button>
                </div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
